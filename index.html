<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pranav Sanjay Oswal | Portfolio</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Portfolio of Pranav Sanjay Oswal, a Computer Engineering student specializing in scalable systems, AI integrations, and full-stack development.">
    <meta property="og:title" content="Pranav Sanjay Oswal | Engineer Portfolio">
    <meta property="og:description" content="Explore my projects, skills, and journey in software engineering.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Apply saved theme before React paints to avoid flash and ensure toggle works -->
    <script>
        (function () {
            var saved = localStorage.getItem('portfolio-theme');
            var dark = saved === 'dark'
                ? true
                : saved === 'light'
                    ? false
                    : window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.classList.toggle('dark', dark);
        })();
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>

</html>
